<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>母亲节快乐</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, #fce4ec 0%, #f8bbd0 30%, #f48fb1 70%, #f8bbd0 100%);
    background-attachment: fixed;
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 20px;
  }

  /* 飘落花瓣 */
  .petals {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .petal {
    position: absolute; top: -60px;
    animation: fall linear infinite;
    opacity: 0.7; font-size: 22px;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.7; }
    100% { transform: translateY(105vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  /* 舞台 */
  .stage {
    position: relative; z-index: 1;
    width: 300px;
    height: 360px;
  }

  /* ===== 信封 ===== */
  .envelope {
    position: absolute;
    width: 100%; height: 100%;
    transition: opacity 0.5s ease 0.8s, transform 0.7s ease 0.8s;
  }
  .envelope.gone {
    opacity: 0;
    transform: scale(0.8);
    pointer-events: none;
  }

  .envelope-body {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 170px;
    background: linear-gradient(160deg, #f8bbd0, #f48fb1);
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(244, 143, 177, 0.45);
    overflow: hidden;
  }
  .envelope-body::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.12) 50%, transparent 60%);
  }

  .envelope-flap {
    position: absolute;
    bottom: 170px; left: 0;
    width: 100%; height: 190px;
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    background: linear-gradient(160deg, #f48fb1, #ec407a);
    border-radius: 10px 10px 0 0;
    transform-origin: bottom center;
    transition: transform 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55), opacity 0.4s ease 0.5s;
    box-shadow: 0 -2px 15px rgba(236, 64, 122, 0.2);
  }
  .envelope-flap.open {
    transform: rotateX(180deg);
    opacity: 0;
  }

  /* 爱心封印 */
  .seal {
    position: absolute;
    bottom: 138px; left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    width: 48px; height: 48px;
    transition: all 0.5s ease;
  }
  .seal.hidden {
    opacity: 0;
    transform: translateX(-50%) scale(0.2);
  }
  .seal-heart {
    width: 100%; height: 100%;
    background: #e91e63;
    transform: rotate(45deg);
    border-radius: 4px 0 4px 0;
    box-shadow: 0 4px 20px rgba(233, 30, 99, 0.6);
    animation: heartbeat 1.2s ease-in-out infinite;
  }
  .seal-heart::before,
  .seal-heart::after {
    content: '';
    position: absolute;
    width: 100%; height: 100%;
    background: #e91e63;
    border-radius: 50%;
    box-shadow: 0 4px 20px rgba(233, 30, 99, 0.4);
  }
  .seal-heart::before { top: -50%; left: 0; }
  .seal-heart::after { top: 0; left: -50%; }

  @keyframes heartbeat {
    0%, 100% { transform: rotate(45deg) scale(1); }
    14% { transform: rotate(45deg) scale(1.1); }
    28% { transform: rotate(45deg) scale(1); }
    42% { transform: rotate(45deg) scale(1.1); }
    70% { transform: rotate(45deg) scale(1); }
  }

  .envelope-lines {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 170px;
    pointer-events: none;
  }
  .envelope-lines::before {
    content: '';
    position: absolute;
    top: 12px; left: 18px; right: 18px; bottom: 12px;
    border: 2px dashed rgba(255,255,255,0.3);
    border-radius: 4px;
  }

  /* 提示 */
  .hint {
    position: absolute;
    bottom: -44px;
    width: 100%;
    text-align: center;
    color: #c2185b;
    font-size: 14px;
    letter-spacing: 2px;
    animation: hintPulse 2s ease-in-out infinite;
    transition: opacity 0.4s ease;
  }
  .hint.hidden { opacity: 0; pointer-events: none; }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ===== 信纸 ===== */
  .letter {
    position: absolute;
    width: 100%;
    background: linear-gradient(180deg, #fffef7, #fffaf2);
    border-radius: 8px;
    padding: 24px 20px;
    box-shadow: 0 8px 30px rgba(180, 100, 120, 0.25);
    z-index: 0;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    pointer-events: none;
  }
  .letter.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  /* 信纸红线 */
  .letter::before {
    content: '';
    position: absolute;
    top: 0; left: 30px;
    width: 2px; height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      #e57373 0px, #e57373 1px,
      transparent 1px, transparent 30px
    );
    opacity: 0.2;
    border-radius: 1px;
  }

  .letter-line {
    color: #5d4037;
    font-size: 16px;
    line-height: 32px;
    padding-left: 6px;
    text-indent: 2em;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .letter-line.show {
    opacity: 1;
    transform: translateY(0);
  }
  .letter-line.signature {
    text-indent: 0;
    text-align: right;
    margin-top: 16px;
    font-size: 15px;
    color: #c2185b;
    font-weight: bold;
  }

  /* ===== 副标题 ===== */
  .subtitle {
    text-align: center;
    color: #c2185b;
    font-size: 16px;
    margin-top: 24px;
    letter-spacing: 4px;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .subtitle.show { opacity: 0.9; }

  /* 爱心粒子 */
  .heart-particle {
    position: fixed;
    pointer-events: none; z-index: 10;
    font-size: 20px;
    animation: particleUp 1.5s ease-out forwards;
  }
  @keyframes particleUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-200px) scale(0.2); }
  }

  @media (max-width: 360px) {
    .stage { width: 260px; height: 330px; }
    .envelope-body, .envelope-lines { height: 150px; }
    .envelope-flap { bottom: 150px; height: 165px; }
    .seal { bottom: 122px; width: 40px; height: 40px; }
    .letter { padding: 20px 16px; }
    .letter-line { font-size: 14px; line-height: 28px; }
  }
</style>
</head>
<body>

<div class="petals" id="petals"></div>

<div class="stage" id="stage">

  <!-- 信封 -->
  <div class="envelope" id="envelope">
    <div class="envelope-flap" id="flap"></div>
    <div class="seal" id="seal"><div class="seal-heart"></div></div>
    <div class="envelope-lines"></div>
    <div class="envelope-body"></div>
    <p class="hint" id="hint">💌 轻点信封开启</p>
  </div>

  <!-- 信纸 -->
  <div class="letter" id="letter">
    <p class="letter-line">亲爱的妈妈：</p>
    <p class="letter-line">时光如梭，又是一年母亲节。</p>
    <p class="letter-line">感谢你不是超人，</p>
    <p class="letter-line">却为了我变成了万能。</p>
    <p class="letter-line">你的碎碎念念，</p>
    <p class="letter-line">温暖了我的岁岁年年。</p>
    <p class="letter-line">世界很大，幸福很小，</p>
    <p class="letter-line">有你在身边，就是最幸福的事。</p>
    <p class="letter-line">愿时光温柔，</p>
    <p class="letter-line">善待我最爱的你。</p>
    <p class="letter-line signature">—— 永远爱你的孩子</p>
    <p class="subtitle" id="subtitle">🌷 母亲节快乐 🌷</p>
  </div>

</div>

<script>
(function() {
  // 花瓣
  const emojis = ['🌸', '🌷', '💮', '🌺', '✿', '🌼'];
  const petalsEl = document.getElementById('petals');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('span');
    p.className = 'petal';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.fontSize = (16 + Math.random() * 18) + 'px';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    petalsEl.appendChild(p);
  }

  const stage = document.getElementById('stage');
  const envelope = document.getElementById('envelope');
  const flap = document.getElementById('flap');
  const seal = document.getElementById('seal');
  const hint = document.getElementById('hint');
  const letter = document.getElementById('letter');
  const subtitle = document.getElementById('subtitle');
  let opened = false;

  stage.addEventListener('click', function() {
    if (opened) return;
    opened = true;

    // 打开信封盖 + 隐藏封印 + 提示
    flap.classList.add('open');
    seal.classList.add('hidden');
    hint.classList.add('hidden');

    // 信封消失，信纸出现
    setTimeout(() => {
      envelope.classList.add('gone');
      letter.classList.add('show');
    }, 600);

    // 逐行浮现文字
    setTimeout(() => {
      const lines = document.querySelectorAll('.letter-line');
      lines.forEach((line, i) => {
        setTimeout(() => line.classList.add('show'), i * 180);
      });
      // 最后显示副标题
      setTimeout(() => subtitle.classList.add('show'), lines.length * 180 + 400);
    }, 900);

    // 爱心粒子
    const rect = stage.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const hearts = ['💕', '💖', '💗', '💝', '✨', '❤️'];
    for (let i = 0; i < 14; i++) {
      setTimeout(() => {
        const particle = document.createElement('span');
        particle.className = 'heart-particle';
        particle.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        particle.style.left = (cx + (Math.random() - 0.5) * 180) + 'px';
        particle.style.top = (cy + (Math.random() - 0.5) * 80) + 'px';
        particle.style.fontSize = (14 + Math.random() * 22) + 'px';
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 1500);
      }, i * 60);
    }
  });
})();
</script>

</body>
</html>
